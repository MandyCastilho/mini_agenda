<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Marque todos os seus compromissos aqui e não esqueça de mais nada com esta mini agenda virtual prática e eficiente.">
  <meta name="keywords" content="agenda virtual, compromissos, organização, produtividade, lembretes, planner digital">
  <meta name="author" content="Amanda Ramos Castilho">

  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">

  <title>Mini Agenda</title>
</head>

<body>

  <div class="container">
    <h1>📅 Mini Agenda</h1>

    <form id="form-agenda">
      <input type="date" id="data" required />
      <input type="text" id="descricao" placeholder="Descrição do compromisso" required />

      <select id="prioridade" required>
        <option value="" disabled selected>Prioridade</option>
        <option value="Alta">Alta 🔴</option>
        <option value="Média">Média 🟠</option>
        <option value="Baixa">Baixa 🟢</option>
      </select>

      <button type="submit">Adicionar</button>
    </form>

    <div class="filtro">
      <label for="filtro-data">Filtrar por data:</label>
      <input type="date" id="filtro-data" />
    </div>

    <ul id="lista-compromissos"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
